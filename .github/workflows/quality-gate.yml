name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

jobs:
  strict-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Warm quarterly series cache
        run: |
          python scripts/warm_quarterly_series_cache.py

      - name: Run strict quality audit
        env:
          EARNINGS_DIGEST_DISABLE_SOURCE_FETCH: "1"
        run: |
          mkdir -p tmp
          python scripts/audit_dynamic_reports.py \
            --all-quarters \
            --history-window 12 \
            --allow-fallback \
            --strict \
            --output tmp/audit-after-strict.json \
            --summary-markdown tmp/audit-summary.md

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-audit
          if-no-files-found: ignore
          path: |
            tmp/audit-after-strict.json
            tmp/audit-summary.md
